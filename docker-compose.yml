services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: server_hub
    image: server_hub:0.0.1
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mariadb
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - .:/app
      - /app/storage
      - /app/bootstrap/cache
    working_dir: /app
    user: "www-data"
    env_file:
      - .env
    depends_on:
      - mariadb
      - redis
      

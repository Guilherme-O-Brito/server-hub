apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minecraft-provisioner
  namespace: games

rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - persistentvolumeclaims
      - services
    verbs:
      - create
      - get
      - list
      - update
      - delete
  - apiGroups: ["apps"]
    resources: 
      - deployments
    verbs:
      - create
      - get
      - list
      - update
      - delete